spring:
  config:
    import: optional:file:.env[.properties], optional:file:rfp/.env[.properties]
  application:
    name: rfp

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # ── Database ──────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/userdb
    username: postgres
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false

  # ── Email (Gmail SMTP) ────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: pinchusinghal6@gmail.com
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Google OAuth2 (placeholders) ──────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile

# ── Custom App Properties ─────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000      # 15 minutes in ms
    refresh-token-expiration: 604800000  # 7 days in ms
  frontend-url: http://localhost:5173
  file:
    upload-dir: D:/RFP/uploads
    max-size: 52428800   # 50MB
  ai:
    base-url: http://localhost:8000