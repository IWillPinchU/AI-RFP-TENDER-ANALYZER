spring:
  config:
    import: optional:file:.env[.properties], optional:file:Spring-backend/.env[.properties]
  application:
    name: rfp

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: jdbc:postgresql://localhost:5432/userdb
    username: postgres
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000      
    refresh-token-expiration: 604800000  
  file:
    upload-dir: ${UPLOAD_DIR}
    max-size: 52428800   #50MB
  ai:
    base-url: ${AI_BASE_URL}